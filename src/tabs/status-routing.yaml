          p.furnace_active,
          () => climateConfig(`furnace_${i}`, `Furnace${i_name}`),
        );
      }

      // Publish Read-Only Sensors
      if (
        typeof p.operating_mode === "string" &&
        p.operating_mode !== "Not Available"
      ) {
        publishSensor(`furnace_${i}_mode`, p.operating_mode, () =>
          sensorConfig(
            `furnace_${i}_mode`,
            `Furnace${i_name} Mode`,
            null,
            null,

    // Decodes GENERATOR_STATUS_1 (1FFDC) and GENERATOR_STATUS_2 (1FFDB)
    messages

    // RV-C spec 6.18.23 and 6.18.24


    // === Helper Functions ===


    function decodeBits(value, startBit, endBit) {
      const mask = ((1 << (endBit - startBit + 1)) - 1) << startBit;
      return (value & mask) >> startBit;
    }


    function decodeUint16(data, startByte) {
      return data[startByte] | (data[startByte + 1] << 8);
    }


    function decodeUint32(data, startByte) {
      return (
        data[startByte] |
        (data[startByte + 1] << 8) |
        (data[startByte + 2] << 16) |
        (data[startByte + 3] << 24)
      );
    }


    // === GENERATOR_STATUS Specific Decoders ===


    // RV-C Table 5.3 uint2 indicator

    const BIT2_STATES = {
      0: "Not Active",
      1: "Active",
      2: "Error",
      3: "Not Available",
    };


    // STATUS_1 - Byte 0: Operational status (§6.18.23)

    function decodeGeneratorStatus(value) {
      const states = {
        0: "Stopped",
        1: "Preheat",
        2: "Cranking",
        3: "Running",
        4: "Priming",
        5: "Fault",
        6: "Engine Run Only",
        7: "Test Mode",
        8: "Voltage Adjust Mode",
        9: "Fault Bypass Mode",
        10: "Configuration Mode",
      };
      return states[value] !== undefined ? states[value] : `Unknown (${value})`;
    }


    // STATUS_1 - Bytes 6-7: Start battery voltage (uint16 LE, Table 5.3)

    // Spec defines this as Vdc using Table 5.3 — resolution not explicitly
    stated.

    // Using 0.05 Vdc/bit consistent with other RV-C DC voltage fields and the

    // CHARGER_STATUS approach, valid range tops at ~3276.75 V (0xFFFA = out of
    range).

    function decodeStartBatteryVoltage(value) {
      if (value <= 65530) {
        return parseFloat((value * 0.05).toFixed(2));
      } else if (value === 65533) {
        return "Out of Range";
      } else if (value === 65534) {
        return "Reserved";
      } else if (value === 65535) {
        return "Not Available";
      }
      return "Invalid";
    }


    // STATUS_2 - Byte 1: Coolant temperature (uint8, °C, -40 offset per Table
    5.3)

    // Output in °F by default to match project convention (see
    decode_thermostat_ambient_status.js)

    function decodeCoolantTemperature(value, isCelsius = false) {
      if (value <= 250) {
        const tempC = value - 40; // -40°C to +210°C range
        return isCelsius ? tempC : parseFloat(((tempC * 9) / 5 + 32).toFixed(1));
      } else if (value === 251) {
        return "Error";
      } else if (value === 252) {
        return "Not Supported";
      } else if (value === 253) {
        return "Out of Range";
      } else if (value === 254) {
        return "Reserved";
      } else if (value === 255) {
        return "Not Available";
      }
      return "Invalid";
    }


    // STATUS_2 - Byte 2: Oil pressure (uint8, kPa, 4 kPa/bit, 0-1000 kPa)

    function decodeOilPressure(value) {
      if (value <= 250) {
        return value * 4; // 4 kPa per step
      } else if (value === 251) {
        return "Error";
      } else if (value === 252) {
        return "Not Supported";
      } else if (value === 253) {
        return "Out of Range";
      } else if (value === 254) {
        return "Reserved";
      } else if (value === 255) {
        return "Not Available";
      }
      return "Invalid";
    }


    // STATUS_2 - Bytes 3-4: Engine RPM (uint16 LE, 0.125 rpm/bit)

    function decodeEngineRPM(value) {
      if (value <= 65530) {
        return parseFloat((value * 0.125).toFixed(2));
      } else if (value === 65533) {
        return "Out of Range";
      } else if (value === 65534) {
        return "Reserved";
      } else if (value === 65535) {
        return "Not Available";
      }
      return "Invalid";
    }


    // STATUS_2 - Bytes 5-6: Fuel rate (uint16 LE, 0.05 lph/bit)

    function decodeFuelRate(value) {
      if (value <= 65530) {
        return parseFloat((value * 0.05).toFixed(2));
      } else if (value === 65533) {
        return "Out of Range";
      } else if (value === 65534) {
        return "Reserved";
      } else if (value === 65535) {
        return "Not Available";
      }
      return "Invalid";

          return parseFloat(((tempC * 9) / 5 + 32).toFixed(1));
        }
      } else if (value === 65533) {
        return "Out of Range";
      } else if (value === 65534) {
        return "Reserved";
      } else if (value === 65535) {
        return "Not Available";
      }
      return "Invalid";

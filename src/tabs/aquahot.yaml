  content: |-
    # Aqua-Hot
    AquaHot hydronic heating systems use two different protocols
    depending on the model year. Older systems use proprietary
    messages, newer ones use a mix of standard RV-C and proprietary.
    This flow decodes both variants to report the status of the
    diesel burner, AC heating elements, engine pre-heat, and zone temperatures.
